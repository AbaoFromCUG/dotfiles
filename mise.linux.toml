[tasks.config-monitor]
depends = ["install ddcutil"]
run = '''
sudo ln -sf "$(realpath etc/udev/rules.d/60-ddcutil-i2c.rules)" /etc/udev/rules.d/60-ddcutil-i2c.rules
sudo ln -sf "$(realpath etc/udev/rules.d/90-backlight.rules)" /etc/udev/rules.d/90-backlight.rules
sudo udevadm control --reload-rules
sudo udevadm trigger
sudo usermod -aG i2c "$USER"
'''


[tasks.service-proxy]
depends = ["install go-yq"]
usage = '''
flag "-t --enable-tun" help="enable tuning"
'''


run = '''
#!/usr/bin/env bash
set -e pipefail

pushd ./service/mihomo/
if [ ! -f config.local.yaml ]; then
    # 参考config.example.yaml 创建
    echo "Please create the config.local.yaml file in the service/mihomo directory based on the config.example.yaml"
    exit 1
fi
mihomo_configs=(config.base.yaml)

if [ "${usage_enable_tun:-false}" == "true" ]; then
    mihomo_configs+=("config.tun.yaml")
fi

mihomo_configs+=("config.local.yaml")

# 使用yq合并配置文件与docker compose文件
yq ea --yaml-fix-merge-anchor-to-spec=true \
    '. as $item ireduce ({}; . *+ $item )' \
    "${mihomo_configs[@]}" \
    | sed -E 's/^([[:space:]]*)"<<"([[:space:]]*:)/\1<<\2/' \
    |yq 'explode(.)' \
    > config.yaml

# 查看/etc/mihomo/config.yaml是否是链接到当前目录的config.yaml，如果不是则提示创建一个符号链接
if [ ! -L /etc/mihomo/config.yaml ] || [ "$(readlink /etc/mihomo/config.yaml)" != "$(readlink -f config.yaml)" ]; then
    echo "Please create a symbolic link from /etc/mihomo/config.yaml to the generated config.yaml in the current directory"
    echo "e.g. sudo ln -s $(readlink -f config.yaml) /etc/mihomo/config.yaml"
    exit 1

# 否则，提示用户重启mihomo服务
else
    echo 'Restarting mihomo service via `systemctl restart mihomo`...'
fi
'''

[tasks.service-sing-box]
depends = ["install sing-box go-yq"]
usage = '''
flag "-t --enable-tun" help="enable tun"
flag "--no-fetch" help="use cached subscription files only"
'''

run = '''
#!/usr/bin/env bash
set -euo pipefail

pushd ./service/sing-box/

if [ ! -f config.local.json ]; then
    echo "Please create the config.local.json file in the service/sing-box directory based on config.local.example.json"
    exit 1
fi

generate_args=(--mihomo-config ../mihomo/config.local.yaml --output config.generated.json)
if [ "${usage_no_fetch:-false}" == "true" ]; then
    generate_args+=(--no-fetch)
fi

uv run ./generate.py "${generate_args[@]}"

sing_box_configs=(config.base.json)

if [ "${usage_enable_tun:-false}" == "true" ]; then
    sing_box_configs+=("config.tun.json")
fi

sing_box_configs+=("config.generated.json" "config.local.json")

merge_args=()
for config in "${sing_box_configs[@]}"; do
    merge_args+=("-c" "$config")
done

sing-box merge config.json "${merge_args[@]}"
sing-box format -w -c config.json
sing-box check -c config.json

if [ ! -L /etc/sing-box/config.json ] || [ "$(readlink /etc/sing-box/config.json)" != "$(readlink -f config.json)" ]; then
    echo "Please create a symbolic link from /etc/sing-box/config.json to the generated config.json in the current directory"
    echo "e.g. sudo ln -s $(readlink -f config.json) /etc/sing-box/config.json"
    exit 1
else
    echo 'Restart sing-box service via `systemctl restart sing-box` when you are ready.'
fi
'''
