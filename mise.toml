[settings]
jobs = 1
experimental = true
auto_env = true
dotfiles.root = "~/.dotfiles"
dotfiles.default_mode = "symlink"

[oci]


[bootstrap.user]
login_shell = "/bin/zsh"

[dotfiles]
# --- home files ---
"~/.npmrc" = "home/npmrc"
"~/.condarc" = "home/condarc"
"~/.bunfig.toml" = "home/bunfig.toml"
"~/.face" = "home/face"
"~/.cargo/config.toml" = "home/cargo/config.toml"

# --- cross-platform config dirs ---
"~/.config/shell" = "config/shell"
"~/.config/mise" = "config/mise"
"~/.config/nvim" = "config/nvim"
"~/.config/yazi" = "config/yazi"
"~/.config/lazygit" = "config/lazygit"
"~/.config/uv" = "config/uv"
"~/.config/opencode" = "config/opencode"
"~/.config/git" = "config/git"
"~/.config/kitty" = "config/kitty"
"~/.config/wezterm" = "config/wezterm"
"~/.config/alacritty" = "config/alacritty"
"~/.config/herdr/config.toml" = "config/herdr/config.toml"

# --- local bin ---
"~/.local/bin" = { source = "local/bin", mode = "symlink-each" }


[tasks.install]
description = "Install packages using system package manager"
usage = '''
arg "<package>" var=#true help="package name(s), support multiple packages separated by space"
'''
run = '''
#!/usr/bin/env bash
echo "No platform-specific installer available for: ${MISE_ENV:-unknown}" >&2
exit 1
'''

[tasks.config-mise]
run = '''
mise dotfiles apply
mise install
mise bootstrap packages install --yes
type -p ya >/dev/null 2>&1 && exec `mise which ya` pkg install
'''

[tasks.config-nvim]
depends = ["config-mise"]
run = '''
nvim --headless -c "Lazy! install" \
    -c "TSInstall lua python shell json cpp" \
    -c 'lua print(string.format("Install %s neovim plugins \n", require("lazy").stats().count))' \
    -c "qall"

'''

[tasks.config-dev]
depends = [
    "config-zsh",
    "config-mise",
    "config-nvim",
    "config-tmux",
    "config-git-user",
    "config-fzf",
]
run = "mise dotfiles apply"


[tasks.easyconnect]
usage = '''
flag "-d --domain <domain>" help="VPN domain"
flag "-u --username <username>" help="VPN username"
flag "-p --password <password>" help="VPN password"
flag "--http-port [http_port]" help="Local HTTP proxy port" default="8888"
flag "--socks-port [socks_port]" help="Local SOCKS5 proxy port" default="1080"
'''
run = '''
docker run --rm --device /dev/net/tun --cap-add NET_ADMIN -ti \
    -p 127.0.0.1:${usage_socks_port}:1080 \
    -p 127.0.0.1:${usage_http_port}:8888 \
    -e EC_VER=7.6.7 \
    -e CLI_OPTS="-d ${usage_domain} -u ${usage_username} -p ${usage_password}" \
    docker.io/hagb/docker-easyconnect:cli
'''
